<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin:0;
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:sans-serif;
}

.container {
  background:#111;
  padding:40px 60px;
  border-radius:20px;
  width:700px;
  box-shadow:0 0 30px rgba(0,0,0,0.8);
  text-align:center;
  overflow:hidden;
}

h1 {
  font-size:2.2em;
  margin-bottom:15px;
  color:white;
}

.bar {
  height:30px;
  background:#222;
  border-radius:15px;
  overflow:hidden;
  position:relative;
}

.fill {
  height:100%;
  width:0%;
  border-radius:15px;

  background:linear-gradient(
    90deg,
    #ffe600,
    #ffbf00,
    #fff200,
    #ffbf00,
    #ffe600
  );

  background-size:300% 100%;

  animation:
    load 60s linear forwards,
    glowMove 2s linear infinite;

  box-shadow:
    0 0 10px rgba(255,230,0,0.8),
    0 0 20px rgba(255,200,0,0.4),
    inset 0 0 5px rgba(255,255,255,0.5);
}

.percent {
  margin-top:10px;
  font-size:1.8em;
  font-weight:bold;
  color:white;
}

.status {
  margin-top:5px;
  font-size:0.9em;
  color:#888;
  height:20px;
}

@keyframes load {
  0% { width:0%; }
  20% { width:35%; }
  35% { width:42%; }
  50% { width:68%; }
  65% { width:72%; }
  80% { width:91%; }
  100% { width:100%; }
}

@keyframes glowMove {
  0% { background-position:0% 0; }
  100% { background-position:300% 0; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Adopt Me Trade Faker and Pet Spawner</h1>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <div class="percent" id="percent">0%</div>
  <div class="status" id="status"></div>
</div>

<script>
const percentEl = document.getElementById('percent');
const statusEl = document.getElementById('status');
const fill = document.getElementById('fill');

const messages = [
  "Initiating Script Loader Service",
  "Fetching Server.Pet.Storage",
  "Fetching Local.Pet.Storage",
  "Linking To Server",
  "Processing Inventory...",
  "Linking to Trade serverscripts",
  "Processing Game.Workspace...",
  "Fetching Local.Pet.Models",
  "Cloning Pet Animations..."
];

let msgIndex = 0;
let isDone = false;
let displayed = 0;
let typingInterval = null;

/* typing effect (fixed) */
function typeText(text) {

  if (typingInterval) {
    clearInterval(typingInterval);
  }

  let i = 0;
  statusEl.textContent = "";

  typingInterval = setInterval(() => {

    statusEl.textContent += text[i];
    i++;

    if (i >= text.length) {
      clearInterval(typingInterval);
      typingInterval = null;
    }

  }, 25);
}

function update() {

  const bar = document.querySelector('.bar');
  const style = window.getComputedStyle(fill);
  let progress = 0;

  if (style.width && bar) {
    progress = (parseFloat(style.width) / bar.offsetWidth) * 100;
  }

  if (displayed < progress) {
    displayed += 0.4;
  }

  let perc = Math.floor(displayed);

  if (perc >= 99 && !isDone) {
    perc = 99;
    percentEl.textContent = perc + '%';
    statusEl.textContent = "Finalizing injection...";
    return;
  }

  percentEl.textContent = perc + '%';

  if (progress >= 100 && !isDone) {

    isDone = true;

    setTimeout(() => {

      percentEl.textContent = "100%";
      typeText("Script loaded! Happy scamming!");

    }, 1500);

    return;
  }

  if (Math.floor(progress / 15) > msgIndex && msgIndex < messages.length - 1) {

    msgIndex++;
    typeText(messages[msgIndex]);

  }
}

typeText(messages[0]);

setInterval(update, 50);
</script>

</body>
</html>
